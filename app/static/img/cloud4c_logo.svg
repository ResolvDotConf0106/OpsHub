<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="100%" height="100%">
  <defs>
    <style>
      .brand-title {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 35px;
        fill: #ffffff;
      }
      .bold-text {
        font-weight: 800;
        letter-spacing: -1px;
      }
      .medium-text {
        font-weight: 500;
        letter-spacing: -0.5px;
      }
      .c-letter {
        font-weight: 200;
        font-size: 37px;
      }
      .subtitle {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 11px;
        font-weight: 700;
        fill: #30ba78; /* SUSE/emerald brand green */
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
    </style>
  </defs>
  <!-- Center aligned CLOUD4C -->
  <text x="110" y="34" class="brand-title" text-anchor="middle">
    <tspan class="bold-text">CLOUD</tspan><tspan class="medium-text">4</tspan><tspan class="c-letter">C</tspan>
  </text>
  <!-- Center aligned Part of Capgemini -->
  <text x="110" y="52" class="subtitle" text-anchor="middle">Part of Capgemini</text>
</svg>
